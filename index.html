<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仪器管理系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============ CSS Variables & Reset ============ */
:root {
  --primary: #4f46e5;
  --primary-light: #6366f1;
  --primary-dark: #3730a3;
  --primary-bg: #eef2ff;
  --success: #059669;
  --success-light: #10b981;
  --success-bg: #ecfdf5;
  --danger: #dc2626;
  --danger-light: #ef4444;
  --danger-bg: #fef2f2;
  --warning: #d97706;
  --warning-light: #f59e0b;
  --warning-bg: #fffbeb;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --gray-900: #0f172a;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.04);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 6px rgba(0,0,0,.04), 0 2px 4px rgba(0,0,0,.04);
  --shadow-md: 0 10px 25px rgba(0,0,0,.06), 0 4px 10px rgba(0,0,0,.04);
  --shadow-lg: 0 20px 50px rgba(0,0,0,.08), 0 8px 20px rgba(0,0,0,.04);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter','SF Pro Display','PingFang SC','Microsoft YaHei',-apple-system,sans-serif;
  background:#f8fafc;
  color:var(--gray-800);
  min-height:100vh;
  position:relative;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* Subtle background texture */
body::before{
  content:'';
  position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:
    radial-gradient(circle at 15% 85%, rgba(99,102,241,.04) 0%, transparent 50%),
    radial-gradient(circle at 85% 15%, rgba(139,92,246,.03) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(59,130,246,.02) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

/* ============ Navbar ============ */
.navbar{
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  padding:14px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 1px 0 rgba(0,0,0,.04), 0 4px 24px rgba(0,0,0,.04);
  position:sticky;top:0;z-index:100;
  border-bottom:1px solid rgba(0,0,0,.04);
}
.navbar span{
  font-size:18px;font-weight:700;
  background:linear-gradient(135deg, var(--primary), #7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  cursor:pointer;
  letter-spacing:-0.3px;
  transition:opacity var(--transition);
}
.navbar span:hover{opacity:.8}

.navbar button{
  padding:9px 18px;
  border:none;
  border-radius:var(--radius-xl);
  cursor:pointer;
  margin-left:6px;
  background:var(--gray-100);
  font-size:13.5px;
  font-weight:500;
  color:var(--gray-600);
  transition:all var(--transition);
  letter-spacing:-0.1px;
}
.navbar button:hover{
  background:var(--gray-200);
  color:var(--gray-800);
}
.navbar button.active{
  background:linear-gradient(135deg, var(--primary), var(--primary-light));
  color:#fff;
  box-shadow:0 4px 12px rgba(79,70,229,.25);
}

/* ============ Container ============ */
.container{max-width:840px;margin:0 auto;padding:28px 20px;position:relative;z-index:1}

/* ============ Cards ============ */
.card{
  background:#fff;
  border-radius:var(--radius-lg);
  padding:28px;
  margin-bottom:20px;
  box-shadow:var(--shadow-sm);
  border:1px solid var(--gray-100);
  transition:box-shadow var(--transition), transform var(--transition);
}
.card:hover{
  box-shadow:var(--shadow);
}
.card h2{
  font-size:18px;
  font-weight:700;
  margin-bottom:16px;
  color:var(--gray-900);
  letter-spacing:-0.3px;
}
.card h3{
  font-size:15px;
  font-weight:600;
  margin-bottom:12px;
  color:var(--gray-700);
  letter-spacing:-0.2px;
}

/* ============ Buttons ============ */
.btn{
  padding:11px 22px;
  border-radius:var(--radius-sm);
  border:none;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  color:#fff;
  margin:4px;
  display:inline-block;
  text-align:center;
  letter-spacing:-0.1px;
  transition:all var(--transition);
  position:relative;
  overflow:hidden;
}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:linear-gradient(135deg, var(--primary), var(--primary-light));
  box-shadow:0 2px 8px rgba(79,70,229,.2);
}
.btn-primary:hover{
  box-shadow:0 6px 20px rgba(79,70,229,.35);
  transform:translateY(-1px);
}
.btn-success{
  background:linear-gradient(135deg, var(--success), var(--success-light));
  box-shadow:0 2px 8px rgba(5,150,105,.2);
}
.btn-success:hover{
  box-shadow:0 6px 20px rgba(5,150,105,.35);
  transform:translateY(-1px);
}
.btn-danger{
  background:linear-gradient(135deg, var(--danger), var(--danger-light));
  box-shadow:0 2px 8px rgba(220,38,38,.2);
}
.btn-danger:hover{
  box-shadow:0 6px 20px rgba(220,38,38,.35);
  transform:translateY(-1px);
}
.btn-outline{
  background:#fff;
  color:var(--primary);
  border:1.5px solid var(--gray-200);
  box-shadow:none;
}
.btn-outline:hover{
  background:var(--primary-bg);
  border-color:var(--primary);
  color:var(--primary-dark);
}
.btn-sm{padding:7px 14px;font-size:12.5px;font-weight:500;border-radius:var(--radius-sm)}
.btn-block{width:100%;margin:4px 0}

/* ============ Status Tags ============ */
.status-tag{
  display:inline-block;
  padding:4px 12px;
  border-radius:var(--radius-xl);
  font-size:12px;
  font-weight:600;
  white-space:nowrap;
  letter-spacing:0.2px;
  line-height:1.6;
}
.status-tag.available{
  background:var(--success-bg);
  color:var(--success);
  border:1px solid rgba(5,150,105,.15);
}
.status-tag.borrowed{
  background:var(--warning-bg);
  color:var(--warning);
  border:1px solid rgba(217,119,6,.15);
}

/* ============ Page Transition ============ */
#main{animation:fadeIn .3s cubic-bezier(0.4,0,0.2,1)}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* ============ Modal ============ */
.modal-overlay{
  display:none;
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(15,23,42,.5);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  z-index:200;
  justify-content:center;align-items:center;padding:16px;
}
.modal-overlay.active{display:flex}
.modal{
  background:#fff;
  border-radius:var(--radius-lg);
  padding:32px;
  width:100%;
  max-width:480px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--gray-100);
  animation:scaleIn .25s cubic-bezier(0.4,0,0.2,1);
}
.modal h3{
  font-size:17px;
  font-weight:700;
  margin-bottom:4px;
  color:var(--gray-900);
  letter-spacing:-0.3px;
}
@keyframes scaleIn{
  from{opacity:0;transform:scale(.96) translateY(8px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

/* ============ Form Elements ============ */
.form-group{margin-bottom:18px}
.form-group label{
  display:block;
  font-weight:600;
  margin-bottom:6px;
  font-size:13.5px;
  color:var(--gray-700);
  letter-spacing:-0.1px;
}
.form-group input,
.form-group select,
.form-group textarea{
  width:100%;
  padding:11px 14px;
  border:1.5px solid var(--gray-200);
  border-radius:var(--radius-sm);
  font-size:14px;
  font-family:inherit;
  color:var(--gray-800);
  background:var(--gray-50);
  transition:all var(--transition);
}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  outline:none;
  border-color:var(--primary);
  background:#fff;
  box-shadow:0 0 0 3px rgba(79,70,229,.1);
}
.form-group input[readonly]{
  background:var(--gray-100);
  color:var(--gray-600);
  cursor:default;
}

/* Search input focus states (inline styles override normal CSS) */
#codeInput:focus{
  border-color:#4f46e5 !important;
  background:#fff !important;
  box-shadow:0 0 0 3px rgba(79,70,229,.1) !important;
}
#search:focus{
  outline:none;
  border-color:#4f46e5 !important;
  background:#fff !important;
  box-shadow:0 0 0 3px rgba(79,70,229,.1) !important;
}

/* ============ Tables ============ */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:13.5px;
  min-width:700px;
}
table th,table td{
  padding:12px 14px;
  text-align:left;
  border-bottom:1px solid var(--gray-100);
}
table th{
  background:var(--gray-50);
  font-weight:600;
  font-size:11.5px;
  color:var(--gray-500);
  text-transform:uppercase;
  letter-spacing:0.5px;
  position:sticky;
  top:0;
}
table th:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
table th:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
table tbody tr{transition:background var(--transition)}
table tbody tr:hover{background:var(--primary-bg)}

/* ============ Toast Notifications ============ */
.toast{
  padding:14px 20px;
  border-radius:var(--radius-sm);
  color:#fff;
  font-weight:600;
  font-size:13.5px;
  margin-bottom:8px;
  animation:slideIn .35s cubic-bezier(0.4,0,0.2,1);
  box-shadow:var(--shadow-md);
  letter-spacing:-0.1px;
}
.toast.success{background:linear-gradient(135deg, var(--success), var(--success-light))}
.toast.error{background:linear-gradient(135deg, var(--danger), var(--danger-light))}
.toast.info{background:linear-gradient(135deg, var(--primary), var(--primary-light))}
@keyframes slideIn{
  from{opacity:0;transform:translateX(40px)}
  to{opacity:1;transform:translateX(0)}
}

/* ============ Instrument Highlight ============ */
.instrument-highlight{
  background:linear-gradient(135deg, var(--primary-bg), #e8e5ff);
  border:1.5px solid rgba(99,102,241,.2);
  border-radius:var(--radius-lg);
  padding:24px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.instrument-highlight::before{
  content:'';
  position:absolute;
  top:-50%;right:-20%;
  width:200px;height:200px;
  background:radial-gradient(circle, rgba(99,102,241,.08) 0%, transparent 70%);
  border-radius:50%;
  pointer-events:none;
}
.instrument-highlight h3{
  font-size:22px;
  font-weight:700;
  color:var(--primary-dark);
  margin-bottom:8px;
  letter-spacing:-0.4px;
  position:relative;
}
.instrument-highlight .code{
  font-family:'SF Mono','Fira Code','Cascadia Code',monospace;
  background:#fff;
  padding:5px 14px;
  border-radius:var(--radius-xl);
  font-size:13.5px;
  display:inline-block;
  margin-bottom:8px;
  border:1px solid rgba(99,102,241,.15);
  color:var(--primary);
  font-weight:500;
  position:relative;
}
.info-row{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  margin-top:10px;
  font-size:13.5px;
  color:var(--gray-600);
  position:relative;
}

/* ============ Stats Grid ============ */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:16px;
  margin-bottom:20px;
}
.stat-card{
  background:#fff;
  border-radius:var(--radius-lg);
  padding:22px 16px;
  text-align:center;
  box-shadow:var(--shadow-xs);
  border:1px solid var(--gray-100);
  transition:all var(--transition);
  cursor:default;
  position:relative;
  overflow:hidden;
}
.stat-card::after{
  content:'';
  position:absolute;
  top:0;left:0;
  width:100%;height:3px;
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
}
.stat-card:nth-child(1)::after{background:linear-gradient(90deg, var(--primary), var(--primary-light))}
.stat-card:nth-child(2)::after{background:linear-gradient(90deg, var(--success), var(--success-light))}
.stat-card:nth-child(3)::after{background:linear-gradient(90deg, var(--warning), var(--warning-light))}
.stat-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}
.stat-card .number{
  font-size:32px;
  font-weight:800;
  letter-spacing:-1px;
  line-height:1;
}
.stat-card .label{
  font-size:12.5px;
  color:var(--gray-500);
  margin-top:8px;
  font-weight:500;
  letter-spacing:-0.1px;
}

/* ============ Search Results ============ */
.search-result-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 8px;
  border-bottom:1px solid var(--gray-100);
  flex-wrap:wrap;
  gap:8px;
  border-radius:var(--radius-sm);
  transition:all var(--transition);
}
.search-result-item:hover{
  background:var(--gray-50);
}

/* ============ Filter Buttons ============ */
.filter-btn{
  padding:7px 14px !important;
  font-size:12.5px !important;
  font-weight:500 !important;
  border-radius:var(--radius-xl) !important;
}

/* ============ Scrollbar ============ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}

/* ============ Responsive ============ */
@media(max-width:600px){
  .container{padding:16px 12px}
  .card{padding:20px 16px}
  .btn{padding:10px 18px;font-size:13px}
  .navbar{padding:12px 16px}
  .navbar span{font-size:16px}
  .navbar button{padding:7px 13px;font-size:12px;margin-left:3px}
  .modal{padding:24px 18px}
  table{min-width:550px;font-size:12px}
  table th,table td{padding:10px 12px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card{padding:16px 12px}
  .stat-card .number{font-size:26px}
}
</style>
</head>
<body>

<nav class="navbar">
    <span onclick="showPage('scan')">仪器管理系统</span>
    <div>
        <button id="nav-scan" class="active" onclick="showPage('scan')">扫码页面</button>
        <button id="nav-admin" onclick="showPage('admin')">管理页面</button>
    </div>
</nav>

<div id="toastBox" style="position:fixed;top:20px;right:20px;z-index:9999"></div>
<div class="container" id="main"></div>

<!-- 用户绑定弹窗 -->
<div class="modal-overlay" id="bindModal">
    <div class="modal">
        <h3>绑定信息</h3>
        <p style="color:#6b7280;margin-bottom:16px;font-size:14px;">首次使用需绑定，以后自动识别</p>
        <form onsubmit="bind(event)">
            <div class="form-group"><label>👤 姓名 *</label><input id="bname" required placeholder="请输入姓名"></div>
            <div class="form-group"><label>📱 手机号 *</label><input id="bphone" required maxlength="11" placeholder="请输入11位手机号"></div>
            <button type="submit" class="btn btn-primary btn-block">确认绑定</button>
        </form>
    </div>
</div>

<!-- 借仪器弹窗 -->
<div class="modal-overlay" id="borrowModal">
    <div class="modal">
        <h3>借出仪器</h3>
        <form onsubmit="borrow(event)">
            <input type="hidden" id="bid">
            <div class="form-group"><label>仪器</label><input id="binfo" readonly style="background:#f1f5f9;font-weight:600;"></div>
            <div class="form-group"><label>👤 借用人</label><input id="bperson" readonly style="background:#f1f5f9;"></div>
            <div class="form-group"><label>📝 用途（仪器使用地点、项目名称） *</label><textarea id="bpurpose" required placeholder="请简要描述借用目的"></textarea></div>
            <div class="form-group"><label>📅 预计归还时间 *</label><input type="datetime-local" id="btime" required></div>
            <button type="submit" class="btn btn-primary btn-block">确认借出</button>
        </form>
    </div>
</div>

<!-- 还仪器弹窗 -->
<div class="modal-overlay" id="returnModal">
    <div class="modal">
        <h3>归还仪器</h3>
        <form onsubmit="return_(event)">
            <input type="hidden" id="rid">
            <div class="form-group"><label>仪器</label><input id="rinfo" readonly style="background:#f1f5f9;font-weight:600;"></div>
            <div class="form-group"><label>归还人</label><input id="rperson" readonly style="background:#fffbeb;font-weight:600;color:#92400e;"></div>
            <div class="form-group"><label>仪器情况 *</label>
                <select id="rcond" required>
                    <option value="">请选择仪器状况</option>
                    <option value="完好">完好</option>
                    <option value="损坏">损坏</option>
                </select>
            </div>
			<div class="form-group">
			    <label>仪器绿标情况 *</label>
			    <select id="rlabel" required>
			        <option value="">请选择绿标状况</option>
			        <option value="完好">完好</option>
			        <option value="丢失">丢失</option>
			        <option value="过期">过期</option>
			    </select>
			</div>
            <button type="submit" class="btn btn-success btn-block">确认归还</button>
        </form>
    </div>
</div>
<div class="modal-overlay" id="batchBorrowModal"><div class="modal">
    <h3>批量借出仪器</h3>
    <form onsubmit="submitBatchBorrow(event)">
        <div class="form-group"><label>选中仪器</label><textarea id="batchInstruments" readonly rows="3" style="background:#f8fafc;"></textarea></div>
        <div class="form-group"><label>👤 借用人</label><input id="batchPerson" readonly></div>
        <div class="form-group"><label>📝 用途（仪器使用地点、项目名称） *</label><textarea id="batchPurpose" required placeholder="请简要描述借用目的"></textarea></div>
        <div class="form-group"><label>📅 预计归还时间 *</label><input type="datetime-local" id="batchTime" required></div>
        <button type="submit" class="btn btn-primary btn-block">确认借出</button>
    </form>
</div></div>

<!-- 添加仪器弹窗 -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h3>➕ 添加新仪器</h3>
        <form onsubmit="addInst(event)">
            <div class="form-group"><label>仪器编号 *</label><input id="acode" required placeholder="例如：INST-005"></div>
            <div class="form-group"><label>仪器名称 *</label><input id="aname" required placeholder="例如：数字示波器"></div>
            <div class="form-group"><label>存放位置</label><input id="aloc" placeholder="例如：实验室A-103"></div>
            <button type="submit" class="btn btn-primary btn-block">添加仪器</button>
        </form>
    </div>
</div>
<div class="modal-overlay" id="forceReturnModal"><div class="modal">
    <h3>⚡ 强制归还</h3>
    <p id="forceReturnInfo" style="margin-bottom:16px;color:#6b7280;"></p>
    <input type="hidden" id="forceReturnId">
    <div class="form-group"><label>🔍 仪器情况 *</label>
        <select id="forceReturnCond" required>
            <option value="">请选择</option>
            <option value="完好">完好</option>
            <option value="损坏">损坏</option>
        </select>
    </div>
    <button class="btn btn-success btn-block" onclick="confirmForceReturn()">✅ 确认归还</button>
    <button class="btn btn-outline btn-block" onclick="closeModal('forceReturnModal')" style="margin-top:8px;">取消</button>
</div></div>
<script>
// ==================== Supabase 配置 ====================
const SUPABASE_URL = 'https://csjifasuetawuwsmvxui.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ZLQ4P2dS1iHbwCa20eqb6w_I5LFYRh8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==================== 全局变量 ====================
let user = null;
let batchMode = false, selectedInstruments = [];
let admin = false;
let page = 'scan';

// ==================== 工具函数 ====================
function toast(msg, type) {
    const d = document.getElementById('toastBox');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    d.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(e.target.id); });

function getUser() { const s = localStorage.getItem('u'); return s ? JSON.parse(s) : null; }
function saveUser(u) { localStorage.setItem('u', JSON.stringify(u)); user = u; }

function checkUser() {
    user = getUser();
    if (!user) { openModal('bindModal'); return false; }
    return true;
}

// ==================== 用户绑定 ====================
async function bind(e) {
    e.preventDefault();
    const n = document.getElementById('bname').value.trim();
    const p = document.getElementById('bphone').value.trim();
    if (!n || !p) { toast('请填写完整信息', 'error'); return; }
    if (p.length !== 11 || !/^\d{11}$/.test(p)) { toast('手机号格式不正确', 'error'); return; }
    const { data, error } = await sb.from('users').insert({ 
        name: n, 
        phone: p, 
        created_at: new Date(Date.now() + 8*60*60*1000).toISOString() 
    }).select().single();
    if (error) { toast('绑定失败：' + error.message, 'error'); return; }
    saveUser({ id: data.id, name: n, phone: p });
    closeModal('bindModal');
    toast('绑定成功！', 'success');
    renderScan();
}

// ==================== 页面导航 ====================
function showPage(p, params) {
    page = p;
    document.getElementById('nav-scan').classList.toggle('active', p === 'scan');
    document.getElementById('nav-admin').classList.toggle('active', p === 'admin');
    
    const main = document.getElementById('main');
    main.style.opacity = '0.5';
    main.style.transition = 'opacity 0.1s ease';
    
    if (p === 'scan') {
        main.className = 'container';
        if (params && params.code) renderCode(params.code);
        else renderScan();
    } else {
        if (!admin) {
            const pw = prompt('请输入管理员密码：');
            if (pw !== '111111') { toast('密码错误', 'error'); showPage('scan'); return; }
            admin = true;
        }
        main.className = 'container';
        renderAdmin();
    }
    
    setTimeout(() => {
        main.style.opacity = '1';
    }, 50);
}

// ==================== 模糊搜索 ====================
async function query() {
    const keyword = document.getElementById('codeInput').value.trim();
    if (!keyword) { toast('请输入关键词', 'error'); return; }

    const { data, error } = await sb
        .from('instruments')
        .select('*')
        .or(`code.ilike.%${keyword}%,name.ilike.%${keyword}%,location.ilike.%${keyword}%`)
        .order('code')
        .limit(50);

    const resultsDiv = document.getElementById('searchResults');
    if (!resultsDiv) return;

    if (error) {
        resultsDiv.innerHTML = `<p style="text-align:center;color:#EF4444;">搜索出错：${error.message}</p>`;
        return;
    }

    if (!data || data.length === 0) {
        resultsDiv.innerHTML = `<p style="text-align:center;color:#9ca3af;">❌ 未找到包含"<b>${keyword}</b>"的仪器</p>`;
        return;
    }

   if (data.length === 1 && !batchMode) {
       resultsDiv.innerHTML = `<p style="text-align:center;color:#10B981;">找到1台仪器，正在跳转...</p>`;
       renderCode(data[0].code);
       return;
   }

            resultsDiv.innerHTML = `
                <p style="color:#64748b;margin-bottom:12px;">🔍 找到 <b style="color:#4f46e5;">${data.length}</b> 台包含"<b>${keyword}</b>"的仪器：</p>
                ${data.map(i => `
                    <div class="search-result-item" style="flex-direction:column;align-items:flex-start;">
                        <div style="display:flex;align-items:center;gap:12px;width:100%;">
                            ${batchMode ? `<input type="checkbox" onchange="toggleSelect('${i.id}','${i.code}','${i.name}')" style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">` : ''}
                           <b style="font-family:monospace;font-size:14px;white-space:nowrap;width:70px;display:inline-block;flex-shrink:0;">${i.code}</b>
                           <span style="color:#334155;width:100px;flex-shrink:0;">${i.name}</span>
                            <span class="status-tag ${i.status}" style="width:50px;text-align:center;flex-shrink:0;">${i.status === 'available' ? '在库' : '借出'}</span>
                            <span style="color:#9ca3af;font-size:12px;flex-shrink:0;">📍 ${i.location || '未指定位置'}</span>
                        </div>
                        <button class="btn btn-outline btn-sm" onclick="renderCode('${i.code}')" style="margin-top:6px;align-self:flex-end;">查看详情</button>
                    </div>
                `).join('')}
            `;
			document.getElementById('codeInput').value = keyword;
}
// ==================== 查看单台仪器详情 ====================
async function renderCode(code) {
    if (!checkUser()) return;
    const { data: i, error } = await sb.from('instruments').select('*').eq('code', code).single();
    if (error || !i) {
        document.getElementById('main').innerHTML = `
            <div class="card" style="text-align:center">
                <h2>❌ 未找到仪器</h2>
                <p style="color:#6b7280;">编号：${code}</p>
                <button class="btn btn-primary" onclick="showPage('scan')">← 返回搜索</button>
            </div>`;
        return;
    }
    const st = i.status === 'available' ? '✅ 在库可用' : '⚠️ 已借出';
    const sc = i.status;
	const m = document.getElementById('main');
	m.style.opacity = '0.6';
	setTimeout(() => { m.style.opacity = '1'; }, 30);
    document.getElementById('main').innerHTML = `
        <div class="instrument-highlight">
            <h3>${i.name}</h3>
            <span class="code">📌 ${i.code}</span>
            <span class="status-tag ${sc}" style="margin-left:8px;">${st}</span>
            <div class="info-row">
                <span>📍 位置：${i.location || '未指定'}</span>
                ${i.status === 'borrowed' ? `
                    <span>👤 借用人：${i.current_borrower || '未知'}</span>
                    <span>📅 借出时间：${i.borrow_time ? new Date(i.borrow_time).toLocaleString() : '-'}</span>
                    <span>⏰ 预计归还：${i.expected_return_time ? new Date(i.expected_return_time).toLocaleString() : '-'}</span>
                ` : ''}
            </div>
        </div>
        <div class="card">
            ${i.status === 'available' 
                ? `<button class="btn btn-primary btn-block" onclick="doBorrow('${i.id}')">借仪器</button>`
                : `<button class="btn btn-success btn-block" onclick="doReturn('${i.id}')">还仪器</button>`
            }
        </div>
        <button class="btn btn-outline btn-sm" onclick="showPage('scan')">← 返回搜索</button>
    `;
}

// ==================== 借仪器 ====================
async function doBorrow(id) {
    const { data: i } = await sb.from('instruments').select('*').eq('id', id).single();
    if (!i || i.status !== 'available') { toast('该仪器不可借', 'error'); return; }
    document.getElementById('bid').value = i.id;
    document.getElementById('binfo').value = i.code + ' - ' + i.name;
    document.getElementById('bperson').value = user.name;
    document.getElementById('bpurpose').value = '';
    const now = new Date();
    now.setDate(now.getDate() + 7);
    document.getElementById('btime').value = now.toISOString().slice(0, 16);
    openModal('borrowModal');
}

async function borrow(e) {
    e.preventDefault();
	const btn = e.target.querySelector('button[type="submit"]');
	if (btn.disabled) return;
	btn.disabled = true;
	btn.textContent = '⏳ 处理中...';
    const id = document.getElementById('bid').value;
    const purpose = document.getElementById('bpurpose').value.trim();
    const rt = document.getElementById('btime').value;
    if (!purpose) { toast('请填写用途', 'error'); return; }
    const now = new Date(Date.now() + 8*60*60*1000).toISOString();
    const { error } = await sb.from('instruments').update({
        status: 'borrowed',
        current_borrower: user.name,
        borrower_phone: user.phone,
        borrow_time: now,
        expected_return_time: rt ? new Date(rt).toISOString() : null
    }).eq('id', id);
    if (error) { toast('操作失败：' + error.message, 'error'); return; }
    const { data: i } = await sb.from('instruments').select('code,name').eq('id', id).single();
    await sb.from('records').insert({
        instrument_id: id,
        instrument_code: i.code,
        instrument_name: i.name,
        borrower: user.name,
        borrower_phone: user.phone,
        purpose,
        borrow_time: now,
        expected_return_time: rt ? new Date(rt).toISOString() : null,
        status: 'borrowed'
    });
	btn.disabled = false;
	btn.textContent = '✅ 确认借出';
    closeModal('borrowModal');
    toast('借出成功！', 'success');
    renderCode(i.code);
}

// ==================== 还仪器 ====================
async function doReturn(id) {
    const { data: i } = await sb.from('instruments').select('*').eq('id', id).single();
    if (!i || i.status !== 'borrowed') { toast('该仪器未借出', 'info'); return; }
    document.getElementById('rid').value = i.id;
    document.getElementById('rinfo').value = i.code + ' - ' + i.name;
    document.getElementById('rperson').value = user.name;
    document.getElementById('rcond').value = '';
	document.getElementById('rlabel').value = '';
    openModal('returnModal');
}

async function return_(e) {
    e.preventDefault();
	const btn = e.target.querySelector('button[type="submit"]');
	if (btn.disabled) return;
	btn.disabled = true;
	btn.textContent = '⏳ 处理中...';
    const id = document.getElementById('rid').value;
    const cond = document.getElementById('rcond').value;
    const label = document.getElementById('rlabel').value;
    if (!cond || !label) { toast('请选择仪器情况和绿标情况', 'error'); return; }
    
    const now = new Date(Date.now() + 8*60*60*1000).toISOString();
    await sb.from('instruments').update({
        status: 'available',
        current_borrower: null,
        borrower_phone: null,
        borrow_time: null,
        expected_return_time: null,
        condition_note: cond === '损坏' ? '归还时标记为损坏' : null,
        label_status: label
    }).eq('id', id);
    
    const { data: r } = await sb.from('records').select('*')
        .eq('instrument_id', id).eq('status', 'borrowed')
        .order('id', { ascending: false }).limit(1).single();
    
    if (r) {
        await sb.from('records').update({
            return_person: user.name,
            return_condition: cond,
            return_time: now,
            status: 'returned',
            label_status: label
        }).eq('id', r.id);
    }
    btn.disabled = false;
    btn.textContent = '✅ 确认归还';
    closeModal('returnModal');
    toast('✅ 归还成功！', 'success');
    const { data: i } = await sb.from('instruments').select('code').eq('id', id).single();
    renderCode(i.code);
}

// ==================== 添加仪器 ====================
async function addInst(e) {
    e.preventDefault();
	const btn = e.target.querySelector('button[type="submit"]');
	if (btn.disabled) return;
	btn.disabled = true;
	btn.textContent = '⏳ 处理中...';
    const code = document.getElementById('acode').value.trim();
    const name = document.getElementById('aname').value.trim();
    const loc = document.getElementById('aloc').value.trim();
    if (!code || !name) { toast('请填写编号和名称', 'error'); return; }
    const { error } = await sb.from('instruments').insert({ code, name, location: loc, status: 'available' });
    if (error) { toast('添加失败：' + error.message, 'error'); return; }
    closeModal('addModal');
    toast('添加成功！', 'success');
    renderAdmin();
}

// ==================== 强制操作 ====================
async function forceBorrow(id) {
    const name = prompt('请输入借用人姓名：');
    if (!name) return;
    const purpose = prompt('请输入用途：');
    await sb.from('instruments').update({
        status: 'borrowed',
        current_borrower: name,
        borrow_time: new Date(Date.now() + 8*60*60*1000).toISOString()
    }).eq('id', id);
    const { data: i } = await sb.from('instruments').select('code,name').eq('id', id).single();
    await sb.from('records').insert({
        instrument_id: id,
        instrument_code: i.code,
        instrument_name: i.name,
        borrower: name,
        purpose,
        borrow_time: new Date(Date.now() + 8*60*60*1000).toISOString(),
        status: 'borrowed'
    });
    toast('强制借出成功', 'success');
    renderAdmin();
}

function forceReturn(id) {
    // 获取仪器信息并显示弹窗
    sb.from('instruments').select('code,name').eq('id', id).single().then(({ data }) => {
        if (data) {
            document.getElementById('forceReturnInfo').textContent = `仪器：${data.code} - ${data.name}`;
            document.getElementById('forceReturnId').value = id;
            document.getElementById('forceReturnCond').value = '';
            openModal('forceReturnModal');
        }
    });
}

async function confirmForceReturn() {
    const id = document.getElementById('forceReturnId').value;
    const cond = document.getElementById('forceReturnCond').value;
    if (!cond) { toast('请选择仪器情况', 'error'); return; }
    
    const now = new Date(Date.now() + 8*60*60*1000).toISOString();
    await sb.from('instruments').update({
        status: 'available', current_borrower: null, borrow_time: null,
        condition_note: cond === '损坏' ? '强制归还-损坏' : null
    }).eq('id', id);
    
    const { data: r } = await sb.from('records').select('*')
        .eq('instrument_id', id).eq('status', 'borrowed')
        .order('id', { ascending: false }).limit(1).single();
    
    if (r) {
        await sb.from('records').update({
            return_person: '管理员', return_condition: cond,
            return_time: now, status: 'returned'
        }).eq('id', r.id);
    }
    
    closeModal('forceReturnModal');
    toast('强制归还成功', 'success');
    renderAdmin();
}

// ==================== 搜索过滤 ====================
function toggleBatchMode() {
    batchMode = !batchMode;
    selectedInstruments = [];
    const btn = document.getElementById('batchBtn');
    const panel = document.getElementById('batchPanel');
    
    if (batchMode) {
        btn.textContent = '退出批量模式';
        btn.style.background = 'linear-gradient(135deg, #dc2626, #ef4444)'; btn.style.color = '#fff'; btn.style.border = 'none'; btn.style.boxShadow = '0 2px 8px rgba(220,38,38,.3)';
        panel.style.display = 'flex';
        document.getElementById('batchCount').textContent = '0';
    } else {
        btn.textContent = '批量借出';
        btn.style.background = ''; btn.style.color = ''; btn.style.border = ''; btn.style.boxShadow = '';
        panel.style.display = 'none';
        document.getElementById('batchCount').textContent = '0';
        // 退出批量模式时，清空搜索结果，避免自动跳转
        document.getElementById('searchResults').innerHTML = '<p style="color:#9ca3af;text-align:center;">请输入关键词开始搜索</p>';
    }
    loadAll();
}
function toggleSelect(id, code, name) {
    const idx = selectedInstruments.findIndex(i => i.id === id);
    if (idx > -1) selectedInstruments.splice(idx, 1);
    else selectedInstruments.push({ id, code, name });
    document.getElementById('batchCount').textContent = selectedInstruments.length;
}
function batchBorrow() {
    if (!checkUser()) return;
    if (selectedInstruments.length === 0) { toast('请先勾选仪器', 'error'); return; }
    
    document.getElementById('batchInstruments').value = selectedInstruments.map(i => i.code + ' - ' + i.name).join('\n');
    document.getElementById('batchPerson').value = user.name;
    document.getElementById('batchPurpose').value = '';
    const now = new Date(); now.setDate(now.getDate() + 7);
    document.getElementById('batchTime').value = now.toISOString().slice(0, 16);
    openModal('batchBorrowModal');
}

async function submitBatchBorrow(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    if (btn.disabled) return;
    btn.disabled = true;
    btn.textContent = '⏳ 处理中...';
    const purpose = document.getElementById('batchPurpose').value.trim();
    const rt = document.getElementById('batchTime').value;
    if (!purpose) { 
        toast('请填写用途', 'error'); 
        btn.disabled = false;
        btn.textContent = '确认借出';
        return; 
    }
    
    // 校验每台仪器是否在库
    const available = [];
    const unavailable = [];
    for (const i of selectedInstruments) {
        const { data } = await sb.from('instruments').select('status').eq('id', i.id).single();
        if (data && data.status === 'available') {
            available.push(i);
        } else {
            unavailable.push(i.code);
        }
    }
    
    if (unavailable.length > 0) {
        toast(`以下仪器已被借出：${unavailable.join(', ')}`, 'error');
        btn.disabled = false;
        btn.textContent = '确认借出';
        return;
    }
    
    const now = new Date(Date.now() + 8*60*60*1000).toISOString();
    for (const i of available) {
        await sb.from('instruments').update({
            status: 'borrowed', current_borrower: user.name, borrower_phone: user.phone,
            borrow_time: now, expected_return_time: rt ? new Date(rt).toISOString() : null
        }).eq('id', i.id);
        await sb.from('records').insert({
            instrument_id: i.id, instrument_code: i.code, instrument_name: i.name,
            borrower: user.name, borrower_phone: user.phone, purpose,
            borrow_time: now, expected_return_time: rt ? new Date(rt).toISOString() : null, status: 'borrowed'
        });
    }
    
    closeModal('batchBorrowModal');
    toast(`成功借出 ${available.length} 台仪器！`, 'success');
    toggleBatchMode();
    loadAll();
    document.getElementById('searchResults').innerHTML = '<p style="text-align:center;color:#9ca3af;">请输入关键词开始搜索</p>';
    btn.disabled = false;
    btn.textContent = '确认借出';
}
function filter() {
    const k = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('#itab tbody tr').forEach(r => {
        r.style.display = r.textContent.toLowerCase().includes(k) ? '' : 'none';
    });
}
const debouncedFilter = debounce(filter, 300);
let currentFilter = 'all';

function filterStatus(status) {
    currentFilter = status;
    const now = new Date();
    document.querySelectorAll('#itab tbody tr').forEach(r => {
        const cells = r.querySelectorAll('td');
        if (cells.length < 4) return;
        const statusCell = cells[3].textContent;
        
        let show = true;
        if (status === 'borrowed') {
            show = statusCell.includes('借出') || statusCell.includes('超期');
        } else if (status === 'overdue') {
            show = statusCell.includes('超期');
        } else if (status === 'available') {
            show = statusCell.includes('在库');
        }
        
        r.style.display = show ? '' : 'none';
    });
    
    // 更新按钮样式
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.style.background = '#fff';
        b.style.color = '#4f46e5';
        b.style.border = '1.5px solid #e2e8f0';
    });
    const activeBtn = document.querySelector(`.filter-btn[data-status="${status}"]`);
    if (activeBtn) {
        activeBtn.style.background = 'linear-gradient(135deg, #4f46e5, #6366f1)';
        activeBtn.style.color = '#fff';
        activeBtn.style.border = '1.5px solid #4f46e5';
    }
}
// ==================== 数据导出 ====================
async function exportData() {
    const { data: instruments } = await sb.from('instruments').select('*').order('code');
    const { data: records } = await sb.from('records').select('*').order('created_at', { ascending: false });
    
   function fmt(t) {
       if (!t) return '';
       const d = new Date(t);
       d.setHours(d.getHours() + 8);
       const month = d.getMonth() + 1;
       const day = d.getDate();
       return month + '/' + day;
   }
    
    let csv = '\uFEFF';
    
    csv += '=== 仪器列表 ===\n';
    csv += '编号,名称,位置,状态,借用人,借出时间,预计归还时间\n';
    if (instruments) {
        instruments.forEach(i => {
            csv += `${i.code},${i.name},${i.location || ''},${i.status === 'available' ? '在库' : '借出'},${i.current_borrower || ''},${fmt(i.borrow_time)},${fmt(i.expected_return_time)}\n`;
        });
    }
    
    csv += '\n\n=== 借用记录 ===\n';
    csv += '仪器编号,名称,借用人,手机号,用途,借出时间,预计归还,归还人,仪器情况,归还时间,状态\n';
    if (records) {
        records.forEach(r => {
            csv += `${r.instrument_code},${r.instrument_name},${r.borrower},${r.borrower_phone || ''},${(r.purpose || '').replace(/,/g, '，')},${fmt(r.borrow_time)},${fmt(r.expected_return_time)},${r.return_person || ''},${r.return_condition || ''},${fmt(r.return_time)},${r.status === 'borrowed' ? '借出中' : '已归还'}\n`;
        });
    }
    
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '仪器管理数据_' + new Date(Date.now() + 8*60*60*1000).toISOString().slice(0, 10) + '.csv';
    a.click();
    toast('导出成功！用 Excel 打开即可', 'success');
}

showPage('scan');
